<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Quesada - Resume</title>
    <link rel="shortcut icon" type="image/png" href="favicon.png"/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script>
        // Redirect to the PDF file when attempting to print
        function handlePrint() {
            window.location.href = 'resume.pdf';
        }

        // Listen for the print event
        window.onbeforeprint = handlePrint;
    </script>
</head>
<body>
    <iframe src="resume.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>
</body>
</html>
